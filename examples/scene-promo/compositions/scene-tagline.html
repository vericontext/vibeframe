<template id="scene-tagline-template">
  <div data-composition-id="tagline" data-start="0" data-duration="3" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="tagline"] {
        position: absolute; inset: 0; width: 100%; height: 100%;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
        color: #fff; overflow: hidden; background: #000;
      }
      [data-composition-id="tagline"] .backdrop {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background-image: url("assets/scene-tagline.png");
        background-size: cover;
        background-position: center;
      }
      [data-composition-id="tagline"] .backdrop::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.55) 100%);
      }
      [data-composition-id="tagline"] .backdrop { transform-origin: center; }
      [data-composition-id="tagline"] .stage {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; justify-content: center;
        gap: 24px; padding: 0 10%;
      }
      [data-composition-id="tagline"] .kicker {
        font-size: 28px; letter-spacing: 6px; text-transform: uppercase;
        color: #00c9ff; font-weight: 600;
      }
      [data-composition-id="tagline"] .title {
        font-size: 110px; font-weight: 800; letter-spacing: -2px;
        line-height: 1.05; margin: 0;
        overflow-wrap: break-word;
      }
      [data-composition-id="tagline"] .subtitle {
        font-size: 38px; font-weight: 300; color: #c0c0d0; max-width: 80%;
        overflow-wrap: break-word;
      }
      [data-composition-id="tagline"] #subtitle .word { display: inline-block; opacity: 0; }
    </style>

    <div class="backdrop"></div>
    <div class="stage">
      <div class="kicker" id="kicker">ONE COMMAND</div>
      <h1 class="title" id="title">Type, render, ship</h1>
      <div class="subtitle" id="subtitle"><span class="word" data-i="0">Type</span> <span class="word" data-i="1">Rendership</span></div>
    </div>

    <audio
      id="narration"
      data-start="0"
      data-duration="auto"
      data-track-index="2"
      src="assets/narration-tagline.wav"
      data-volume="1"
    ></audio>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from('[data-composition-id="tagline"]', { opacity: 0, duration: 0.4, ease: 'power2.out' }, 0);
      tl.to('[data-composition-id="tagline"]', { opacity: 0, duration: 0.4, ease: 'power2.in' }, 2.60);
      tl.fromTo('[data-composition-id="tagline"] .backdrop', { scale: 1.0 }, { scale: 1.08, duration: 3.00, ease: 'none' }, 0);
      tl.from('[data-composition-id="tagline"] #kicker', { opacity: 0, y: 16, duration: 0.4, ease: 'power2.out' }, 0.1);
      tl.from('[data-composition-id="tagline"] #title', { opacity: 0, y: 60, duration: 0.7, ease: 'power3.out' }, 0.25);
      tl.fromTo('[data-composition-id="tagline"] #subtitle .word[data-i="0"]', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.18, ease: 'power2.out' }, 0);
      tl.fromTo('[data-composition-id="tagline"] #subtitle .word[data-i="1"]', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.18, ease: 'power2.out' }, 0.66);
      

      window.__timelines["tagline"] = tl;
    </script>
  </div>
</template>
