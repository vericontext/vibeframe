<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0A0A0F;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="9"
      data-width="1920"
      data-height="1080"
    >
      <!--
        Beat clip references. Each `data-composition-src` points at the
        HTML file that `compose-scenes-with-skills` writes (one per
        STORYBOARD `## Beat <id> — Title` heading). Beat ids here MUST
        match the storyboard headings; if you rename a beat, update both.
      -->
      <div class="clip" data-composition-id="scene-hook"  data-composition-src="compositions/scene-hook.html"  data-start="0" data-duration="3" data-track-index="0"></div>
      <div class="clip" data-composition-id="scene-claim" data-composition-src="compositions/scene-claim.html" data-start="3" data-duration="3" data-track-index="0"></div>
      <div class="clip" data-composition-id="scene-close" data-composition-src="compositions/scene-close.html" data-start="6" data-duration="3" data-track-index="0"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
