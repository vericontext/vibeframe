name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          CI: true

      # Dry-run both packages first to catch errors before any real publish
      - name: Validate publish (dry-run)
        run: |
          pnpm -F @vibeframe/mcp-server publish --access public --no-git-checks --dry-run
          pnpm -F @vibeframe/cli publish --access public --no-git-checks --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish both — if one fails, the other may have succeeded.
      # Re-running the workflow is safe: npm ignores already-published versions.
      - name: Publish @vibeframe/mcp-server
        run: pnpm -F @vibeframe/mcp-server publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibeframe/cli
        run: pnpm -F @vibeframe/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
