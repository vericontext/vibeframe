<template id="scene-wonder-template">
  <div data-composition-id="scene-wonder" data-start="0" data-duration="6" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="scene-wonder"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #0B1622;
        overflow: hidden;
      }

      [data-composition-id="scene-wonder"] .clip {
        position: absolute;
        inset: 0;
      }

      [data-composition-id="scene-wonder"] .backdrop-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      [data-composition-id="scene-wonder"] .overlay-clip {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      /* Letterbox bars */
      [data-composition-id="scene-wonder"] .letterbox-top,
      [data-composition-id="scene-wonder"] .letterbox-bottom {
        position: absolute;
        left: 0;
        width: 100%;
        height: 72px;
        background: #0B1622;
        z-index: 10;
      }
      [data-composition-id="scene-wonder"] .letterbox-top    { top: 0; }
      [data-composition-id="scene-wonder"] .letterbox-bottom { bottom: 0; }

      /* Lower-third title area */
      [data-composition-id="scene-wonder"] .lower-third {
        position: absolute;
        bottom: 120px;
        left: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        z-index: 20;
      }

      [data-composition-id="scene-wonder"] .wonder-title {
        font-family: 'Cormorant', 'Georgia', serif;
        font-weight: 300;
        font-size: 72px;
        letter-spacing: 0.22em;
        color: #F4F1EA;
        text-transform: uppercase;
        line-height: 1;
        opacity: 0;
      }

      [data-composition-id="scene-wonder"] .wonder-rule {
        width: 0px;
        height: 1px;
        background: #F4F1EA;
        opacity: 0;
      }

      [data-composition-id="scene-wonder"] .wonder-label {
        font-family: 'Cormorant', 'Georgia', serif;
        font-weight: 400;
        font-size: 18px;
        letter-spacing: 0.38em;
        color: #F4F1EA;
        text-transform: uppercase;
        opacity: 0;
      }

      /* Subtle vignette */
      [data-composition-id="scene-wonder"] .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 40%, rgba(11,22,34,0.55) 100%);
        z-index: 5;
        pointer-events: none;
      }

      /* Accent glow — warm parka echo at bottom centre */
      [data-composition-id="scene-wonder"] .parka-glow {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        width: 320px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(ellipse at 50% 60%, rgba(216,69,46,0.18) 0%, rgba(216,69,46,0) 100%);
        z-index: 6;
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <!-- Full-bleed video — direct child of composition root, NOT nested in a timed clip -->
    <video
      id="video-wonder"
      src="assets/video-wonder.mp4"
      data-start="0"
      data-duration="6"
      data-media-start="0"
      data-track-index="0"
      class="backdrop-video"
      muted
      playsinline
    ></video>

    <!-- Vignette (non-timed decorative) -->
    <div class="vignette"></div>

    <!-- Parka warm glow (non-timed decorative) -->
    <div class="parka-glow"></div>

    <!-- Letterbox (non-timed) -->
    <div class="letterbox-top"></div>
    <div class="letterbox-bottom"></div>

    <!-- Overlay text — full-window clip, no nested data-start on the video -->
    <div class="clip overlay-clip" data-start="0" data-duration="6" data-track-index="1">
      <div class="lower-third">
        <div class="wonder-title">The Whole Sky</div>
        <div class="wonder-rule"></div>
        <div class="wonder-label">Chasing Light</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Idle Ken-Burns on the video wrapper kept off the text ancestors.
      // The video itself can't be directly scaled (framework owns it),
      // so we animate the vignette plane as a subtle breathing layer.
      tl.fromTo(".vignette",
        { opacity: 0.85 },
        { opacity: 1.0, duration: 6, ease: "sine.inOut" },
        0
      );

      // Parka glow pulses in during the emotional peak
      tl.fromTo(".parka-glow",
        { opacity: 0, scale: 0.8 },
        { opacity: 1, scale: 1.1, duration: 2.4, ease: "sine.inOut" },
        1.2
      );

      // Title fades up from slight lift — slow, reverent
      tl.fromTo(".wonder-title",
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 1.4, ease: "sine.inOut" },
        0.8
      );

      // Hairline rule expands outward from centre
      tl.fromTo(".wonder-rule",
        { width: 0, opacity: 0 },
        { width: 180, opacity: 0.55, duration: 1.0, ease: "power2.inOut" },
        1.8
      );

      // Label small-caps attribution rises last
      tl.fromTo(".wonder-label",
        { opacity: 0, y: 8 },
        { opacity: 0.7, y: 0, duration: 0.9, ease: "sine.inOut" },
        2.4
      );

      // Timeline anchor — holds final state to beat boundary
      tl.set(".wonder-title", { opacity: 1, y: 0 }, 5.999);

      window.__timelines["scene-wonder"] = tl;
    </script>
  </div>
</template>
