<template id="scene-trek-template">
  <div data-composition-id="scene-trek" data-start="0" data-duration="6" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="scene-trek"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #0B1622;
        overflow: hidden;
      }

      [data-composition-id="scene-trek"] .clip {
        position: absolute;
        inset: 0;
      }

      /* Letterbox bars */
      [data-composition-id="scene-trek"] .letterbox-top,
      [data-composition-id="scene-trek"] .letterbox-bottom {
        position: absolute;
        left: 0;
        width: 100%;
        height: 80px;
        background: #0B1622;
        z-index: 20;
        pointer-events: none;
      }
      [data-composition-id="scene-trek"] .letterbox-top {
        top: 0;
      }
      [data-composition-id="scene-trek"] .letterbox-bottom {
        bottom: 0;
      }

      /* Lower-third label */
      [data-composition-id="scene-trek"] .lower-label {
        position: absolute;
        bottom: 108px;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 30;
        pointer-events: none;
      }

      [data-composition-id="scene-trek"] .label-text {
        font-family: "Georgia", serif;
        font-weight: 300;
        font-size: 22px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #F4F1EA;
        opacity: 0.72;
      }

      /* Vignette overlay */
      [data-composition-id="scene-trek"] .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 50%, rgba(11,22,34,0) 38%, rgba(11,22,34,0.72) 100%);
        z-index: 10;
        pointer-events: none;
      }

      /* Cold blue color-grade tint */
      [data-composition-id="scene-trek"] .color-grade {
        position: absolute;
        inset: 0;
        background: rgba(20, 38, 68, 0.18);
        z-index: 11;
        pointer-events: none;
      }

      /* Grain overlay using SVG noise */
      [data-composition-id="scene-trek"] .grain {
        position: absolute;
        inset: 0;
        z-index: 12;
        opacity: 0.06;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='512' height='512' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        background-size: 256px 256px;
      }
    </style>

    <!-- Video: direct child of composition root, NOT nested in a timed clip -->
    <video
      id="trek-video"
      data-start="0"
      data-duration="6"
      data-media-start="0"
      data-track-index="0"
      src="assets/video-trek.mp4"
      muted
      playsinline
      style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;"
    ></video>

    <!-- Vignette + color grade + grain — non-timed visual containers -->
    <div class="vignette"></div>
    <div class="color-grade"></div>
    <div class="grain"></div>

    <!-- Letterbox bars -->
    <div class="letterbox-top"></div>
    <div class="letterbox-bottom"></div>

    <!-- Lower-third label: full-window clip, GSAP drives visibility -->
    <div class="clip" data-start="0" data-duration="6" data-track-index="1">
      <div class="lower-label">
        <span class="label-text">Into the Dark</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Idle Ken-Burns on the color-grade overlay — anchors timeline to full 6s
      // without transforming text ancestors or the video element.
      tl.fromTo(".color-grade",
        { opacity: 0.18 },
        { opacity: 0.26, duration: 6, ease: "sine.inOut" },
        0
      );

      // Vignette breathes very subtly
      tl.fromTo(".vignette",
        { opacity: 0.85 },
        { opacity: 1.0, duration: 6, ease: "sine.inOut" },
        0
      );

      // Letterbox bars slide in from top and bottom
      tl.from(".letterbox-top",
        { y: -80, duration: 1.1, ease: "power2.out" },
        0.1
      );
      tl.from(".letterbox-bottom",
        { y: 80, duration: 1.1, ease: "power2.out" },
        0.1
      );

      // Lower-third label fades in after bars settle
      tl.from(".label-text",
        { opacity: 0, duration: 1.4, ease: "sine.inOut" },
        1.5
      );

      // Anchor — hold label at natural state through end of beat
      tl.set(".label-text", { opacity: 0.72 }, 5.999);

      window.__timelines["scene-trek"] = tl;
    </script>
  </div>
</template>
