<template id="scene-ignite-template">
  <div data-composition-id="scene-ignite" data-start="0" data-duration="6" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="scene-ignite"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #0B1622;
        overflow: hidden;
      }

      [data-composition-id="scene-ignite"] .clip {
        position: absolute;
        inset: 0;
      }

      [data-composition-id="scene-ignite"] .video-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      [data-composition-id="scene-ignite"] .letterbox-top,
      [data-composition-id="scene-ignite"] .letterbox-bottom {
        position: absolute;
        left: 0;
        right: 0;
        height: 72px;
        background: #0B1622;
        z-index: 10;
        pointer-events: none;
      }

      [data-composition-id="scene-ignite"] .letterbox-top {
        top: 0;
      }

      [data-composition-id="scene-ignite"] .letterbox-bottom {
        bottom: 0;
      }

      [data-composition-id="scene-ignite"] .overlay-clip {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-start;
        padding: 0 160px 140px 160px;
        box-sizing: border-box;
        pointer-events: none;
      }

      [data-composition-id="scene-ignite"] .scene-label {
        font-family: 'Georgia', serif;
        font-weight: 300;
        font-size: 22px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #D8452E;
        opacity: 0;
        margin-bottom: 18px;
        font-variant-caps: all-small-caps;
      }

      [data-composition-id="scene-ignite"] .scene-title {
        font-family: 'Georgia', serif;
        font-weight: 300;
        font-size: 72px;
        letter-spacing: 0.06em;
        color: #F4F1EA;
        opacity: 0;
        line-height: 1.1;
      }

      [data-composition-id="scene-ignite"] .aurora-glow {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 72px;
        height: 320px;
        background: radial-gradient(ellipse 120% 60% at 50% 100%, rgba(64,210,140,0.18) 0%, rgba(32,160,110,0.08) 50%, rgba(11,22,34,0) 100%);
        z-index: 5;
        pointer-events: none;
        opacity: 0;
      }
    </style>

    <!-- Video layer: direct child of composition root, NOT inside a timed wrapper -->
    <video
      id="ignite-video"
      class="video-layer"
      src="assets/video-ignite.mp4"
      data-start="0"
      data-duration="6"
      data-track-index="0"
      data-media-start="0"
      muted
      playsinline
      style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"
    ></video>

    <!-- Aurora horizon glow overlay -->
    <div class="aurora-glow"></div>

    <!-- Cinematic letterbox bars -->
    <div class="letterbox-top"></div>
    <div class="letterbox-bottom"></div>

    <!-- Text overlay clip — full-window, timed to full beat -->
    <div class="clip" data-start="0" data-duration="6" data-track-index="2">
      <div class="overlay-clip">
        <div class="scene-label">First Light</div>
        <div class="scene-title">Chasing Light</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Idle anchor: subtle Ken-Burns on aurora glow to hold timeline to full 6s
      tl.fromTo(".aurora-glow",
        { opacity: 0, scaleY: 1.0 },
        { opacity: 1, scaleY: 1.08, duration: 6, ease: "sine.inOut" },
        0
      );

      // Scene label fades in gently at t=0.8s
      tl.fromTo(".scene-label",
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 1.2, ease: "sine.out" },
        0.8
      );

      // Title drifts in slowly at t=1.3s — restrained, cinematic
      tl.fromTo(".scene-title",
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 1.6, ease: "sine.out" },
        1.3
      );

      // Timeline anchor at full beat duration — keeps hold phase from going black
      tl.set(".aurora-glow", { opacity: 1 }, 5.999);

      window.__timelines["scene-ignite"] = tl;
    </script>
  </div>
</template>
