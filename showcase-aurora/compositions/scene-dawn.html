<template id="scene-dawn-template">
  <div data-composition-id="scene-dawn" data-start="0" data-duration="6" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="scene-dawn"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #0B1622;
        overflow: hidden;
      }

      [data-composition-id="scene-dawn"] .clip {
        position: absolute;
        inset: 0;
      }

      [data-composition-id="scene-dawn"] .video-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      [data-composition-id="scene-dawn"] #dawn-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* Thin cinematic letterbox bars */
      [data-composition-id="scene-dawn"] .letterbox-top,
      [data-composition-id="scene-dawn"] .letterbox-bottom {
        position: absolute;
        left: 0;
        width: 100%;
        height: 72px;
        background: #0B1622;
        z-index: 10;
      }
      [data-composition-id="scene-dawn"] .letterbox-top { top: 0; }
      [data-composition-id="scene-dawn"] .letterbox-bottom { bottom: 0; }

      /* Subtle warm amber vignette to frame the dawn horizon */
      [data-composition-id="scene-dawn"] .vignette {
        position: absolute;
        inset: 0;
        z-index: 5;
        background: radial-gradient(ellipse 120% 80% at 50% 60%, rgba(0,0,0,0) 40%, rgba(11,22,34,0.55) 100%);
        pointer-events: none;
      }

      /* Warm glow from the horizon — dawn amber bloom */
      [data-composition-id="scene-dawn"] .dawn-bloom {
        position: absolute;
        left: 50%;
        bottom: 72px;
        transform: translateX(-50%);
        width: 1400px;
        height: 340px;
        border-radius: 50%;
        background: radial-gradient(ellipse 100% 100% at 50% 100%, rgba(216,150,60,0.28) 0%, rgba(216,69,46,0.10) 55%, rgba(11,22,34,0) 100%);
        z-index: 6;
        pointer-events: none;
      }

      /* Closing title — lower third */
      [data-composition-id="scene-dawn"] .scene-content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding-bottom: 148px;
        z-index: 20;
        pointer-events: none;
      }

      [data-composition-id="scene-dawn"] .title-line {
        font-family: "Cormorant", "Georgia", serif;
        font-weight: 300;
        font-size: 68px;
        letter-spacing: 0.28em;
        color: #F4F1EA;
        text-transform: uppercase;
        line-height: 1;
        opacity: 0; /* animated in */
      }

      [data-composition-id="scene-dawn"] .rule-line {
        width: 320px;
        height: 1px;
        background: #F4F1EA;
        margin-top: 20px;
        opacity: 0;
        transform-origin: center center;
      }

      [data-composition-id="scene-dawn"] .subtitle-line {
        font-family: "Cormorant", "Georgia", serif;
        font-weight: 300;
        font-size: 22px;
        letter-spacing: 0.38em;
        color: #F4F1EA;
        text-transform: uppercase;
        margin-top: 18px;
        opacity: 0;
      }
    </style>

    <!-- Full-bleed video — direct child of composition root, NOT inside a timed clip -->
    <div class="video-layer">
      <video
        id="dawn-video"
        src="assets/video-dawn.mp4"
        data-start="0"
        data-duration="6"
        data-media-start="0"
        data-track-index="0"
        muted
        playsinline
        style="width:100%;height:100%;object-fit:cover;display:block;"
      ></video>
    </div>

    <!-- Letterbox bars -->
    <div class="letterbox-top"></div>
    <div class="letterbox-bottom"></div>

    <!-- Radial vignette -->
    <div class="vignette"></div>

    <!-- Dawn amber bloom on horizon -->
    <div class="dawn-bloom"></div>

    <!-- Text overlay clip — full window, non-timed wrapper -->
    <div class="clip" data-start="0" data-duration="6" data-track-index="1">
      <div class="scene-content">
        <div class="title-line">Chasing Light</div>
        <div class="rule-line"></div>
        <div class="subtitle-line">A short film</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Idle anchor: gentle Ken-Burns on the dawn bloom, keeps timeline alive for full 6s
      tl.fromTo(".dawn-bloom",
        { scale: 1.0, opacity: 0.7 },
        { scale: 1.08, opacity: 1.0, duration: 6, ease: "sine.inOut" },
        0
      );

      // Subtle ambient breath on vignette — barely perceptible
      tl.fromTo(".vignette",
        { opacity: 0.85 },
        { opacity: 1.0, duration: 6, ease: "sine.inOut" },
        0
      );

      // Title fade-in — slow, reverent, after a moment of hush
      tl.to(".title-line", {
        opacity: 1,
        duration: 1.4,
        ease: "power1.out"
      }, 1.6);

      // Rule line — scales in from center after title settles
      tl.to(".rule-line", {
        opacity: 0.55,
        scaleX: 1,
        duration: 0.9,
        ease: "sine.inOut"
      }, 2.6);

      // Subtitle — drifts up softly into place
      tl.fromTo(".subtitle-line",
        { opacity: 0, y: 10 },
        { opacity: 0.72, y: 0, duration: 1.1, ease: "power2.out" },
        3.2
      );

      // End anchor — hold natural state at t=5.999
      tl.set(".dawn-bloom", { scale: 1.08, opacity: 1.0 }, 5.999);

      window.__timelines["scene-dawn"] = tl;
    </script>
  </div>
</template>
